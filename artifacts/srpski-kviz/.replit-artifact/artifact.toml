kind = "web"
previewPath = "/"
title = "Srpski Kviz"
version = "1.0.0"
id = "artifacts/srpski-kviz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24149

[services.development]
run = "pnpm --filter @workspace/srpski-kviz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/srpski-kviz", "run", "build" ]
publicDir = "artifacts/srpski-kviz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24149"
BASE_PATH = "/"
